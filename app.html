<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lendro Dashboard</title>

    <!-- Tailwind CDN https://checkout.squadco.com/widget/squad.min.js https://cdn.squadco.com/inline/squadco.js-->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://checkout.squadco.com/widget/squad.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }
    </style>
  </head>

  <body class="bg-gray-100">
    <div id="root"></div>

    <script src="assets/components/epopups.jsx"></script>
    <script src="assets/components/ehelper.jsx"></script>
    <script src="assets/components/ewallet.jsx"></script>
    <script src="assets/components/eheader.jsx"></script>
    
    <!--
    <script src="assets/components/econtest.jsx"></script>
    <script src="assets/components/eloan.jsx"></script>
    <script src="assets/components/ejoin.jsx"></script>
    <script src="assets/components/eparticipate.jsx"></script> 
    -->
    <script src="assets/components/eservices.jsx"></script>
    <script src="assets/components/etransactions.jsx"></script>
    <script src="assets/components/ehome.jsx"></script>    
    <script src="assets/components/eabout.jsx"></script>
    <script src="assets/components/ewcfund.jsx"></script>
    <script src="assets/components/enotifications.jsx"></script>
    <script src="assets/components/escores-breakdown.jsx"></script>
    <script src="assets/components/esidemenus.jsx"></script>
    <script src="assets/components/efooter.jsx"></script>

    <script>
      const { useState,useEffect,createElement } = React;
      const e = createElement;
      let setGlobalAlert = null;

      function App() {
        const Per5Point = 3; //5pts = 3%....60% = 100Pts (20x of 5Pts)

        const [menuOpen, setMenuOpen] = useState(false);
        const [page, setPage] = useState("home");
        const [popupOpen,setPopupOpen] = useState({open:false,data:{}});
        const [maxCUPoint,setMaxCUPoint] = useState(2000);

        const [greeting,setGreeting] = useState("");
        const [userData,setUserData] = useState(null);
        const [walletData,setWalletData] = useState(null);/*() => {
          const stored = getStorage("lendro.wallet");
          return stored || null;
        }*/
        const [shareData,setShareData] = useState(null);
        const [busy, setBusy] = useState(false);
        const [homeData,setHomeData] = useState(null);
        const [loanData,setLoanData] = useState(null);
        const [contestData,setContestData] = useState(null);
        const [servicesData,setServicesData] = useState(null); //From Flutterwave
        const [itemData,setItemData] = useState(null);

        const [transactions,setTransactions] = useState(null);
        const [leaderboardData,setLeaderboardData] = useState(null);

        const submitPayment = ()=>{
          alert("Submitting payment...");
          setPopupOpen({open:false,data:{}});
        };
        
        // Greeting + SideMenu close on outside click
        useEffect(() => {
          setUserData(getStorage("lendro.user"));
            let wallet = getStorage("lendro.wallet"); 
            setWalletData(wallet);
            if(wallet?.maxusage) setMaxCUPoint(wallet?.maxusage);
          setServicesData(getStorage("lendro.services") || null);
          setGreeting( window.GetGreeting("") );

          function handleBodyClick(e) {
            const menu = document.getElementById("sideMenu");
            if (!menu) return;
            if (menuOpen && !menu.contains(e.target) && !e.target.closest("[data-menu-btn]") ) {
              setMenuOpen(false);
            }
          }

          document.addEventListener("click", handleBodyClick);
          return () => document.removeEventListener("click", handleBodyClick);
        }, [menuOpen]);
        
        //Lucide icons reload on page and menuopen
        useEffect(() => {
              lucide.createIcons();
        }, [menuOpen,page,transactions,leaderboardData,itemData,popupOpen]);

        //Auto check auth on mount
        useEffect(() => {
          async function checkAuth() {
            try {
              const data = await apiFetch("/auth/auth.php", {});

              if (!data.loggedin) { 
                window.location.href = `${baseUrl}/index.html`;
              }
            } catch (err) {
              console.error("Auth check failed", err);
            } finally {
              lucide.createIcons();
            }
          }
          checkAuth();
        }, []);

        //API DATA FETCH for pages when mounted....
        const refreshData = async () => {
          let url = "";
          let ver = getStorage("lendro.services.ver");          

          if (page === "home") url = `/accounts/home.php`;
          //if (page === "loan") url = `/accounts/loan.php`;
          if (page === "services") url = `/client/services.php`;
          //if (page === "contest") url = `/accounts/contest.php`;
          if(page === "wcfund") return;
          
          if (!url) return;
          
          try {
            const res = await apiFetch(url, {ver});
            setBusy(true);
            
            console.log(url,res);

            if(res?.status === "Err500") setPage("errpage");
            if (res?.status === "LE01") {  window.location.href = `${baseUrl}/index.html`; return; }
            if (res?.status === "success" && res.data) {

              if (page === "home") { 
                if(res.data?.wallet){
                  saveStorage("lendro.wallet",res.data?.wallet,{merge:true});
                  setWalletData(res.data?.wallet);
                  setMaxCUPoint(res.data?.wallet.maxusage);
                }

                if(res.data?.services){
                  setServicesData(res.data?.services);
                  saveStorage("lendro.services",res.data?.services,{merge:true});
                  //console.log(ServicesData);
                }
                setTransactions(res.data?.transactions || []);
                setLeaderboardData(res.data?.leaderboard || []);
                if(res.data?.services){
                  saveStorage("lendro.services",res.data?.services,{merge:true});
                }
              }

              if (page === "loan") setLoanData(res.data);
              if (page === "services"){
                if(res.data?.services){
                  setServicesData(res.data?.services || getStorage("lendro.services"));
                  saveStorage("lendro.services",res.data?.services,{merge:true});
                }
              }
              if (page === "contest") setContestData(res.data?.leaderboard || []);
            }
          } catch (err) {
            console.error("API error:", err);
          } finally{
            setBusy(false);
            lucide.createIcons();
          }
        };

        useEffect(() => { 
          window.scrollTo(0, 0); 
          refreshData(); 
        }, [page]);
        
        const updateWallet = (newWallet) => {
          setWalletData(newWallet);
          saveStorage("lendro.wallet",newWallet,{merge:true});
        };

        //Logout handler
        const handleLogout = async () => {
          try {
            const data = await apiFetch("/auth/logout.php", {});
            if (data?.status === "success") { 
              removeStorage("lendro.user");
              //removeStorage("lendro.userphone");
              removeStorage("lendro.wallet");
              removeStorage("lendro.alerts");
              //removeStorage("lendro.services.ver");
              console.log("logged out!");
              window.location.href = `${baseUrl}/index.html`;
            }
          } catch (err) {  console.error("Logout failed", err); }
        };
        
        ////////////////////////////////////// app-shell 
        return (
          e("div", { className: "min-h-screen bg-gradient-to-b from-gray-50 to-gray-100 pb-20" },
            
            e(SpinnerOverlay, { show: busy }),
            e(GlobalAlert),

            page === "home" && e(Home, { user:userData,wallet:walletData, categories:servicesData?.categories,airtime:servicesData?.airtime, greeting, maxCUPoint,transactions,leaderboard:leaderboardData,Per5Point,setPage,popupOpen,setPopupOpen,setBusy }), 

            //page === "participate" && e(Participate, {user:userData,wallet:walletData, setPage,updateWallet }),
            //page === "myscores" && e(MyScores, { wallet:walletData, setPage,maxCUPoint,Per5Point }),
            page === "wcfund" && e(WCFund, {wallet:walletData, setPage,shares:shareData }),

            //page === "loan" && e(Loan, { data:loanData, wallet:walletData, Per5Point,setPage }),
            page === "services" && e(Services, { services:servicesData, wallet:walletData, Per5Point,setPage,popupOpen,setPopupOpen,setBusy }),
            
            //page === "contest" && e(Contest, { data:contestData, wallet:walletData, maxCUPoint, Per5Point, setPage }),
            //page === "join" && e(Join, {wallet:walletData, setPage }),
            page === "about" && e(About, { setPage }),
            //page === "notifications" && e(Notifications, { setPage }),
            
            page === "wallet" && e(Wallet, {wallet:walletData, setPage,transactions,popupOpen,setPopupOpen,setBusy }),

            page === "pageitems" && e(PageItems, { services:servicesData,setServicesData, wallet:walletData, Per5Point,setPage,popupOpen,setPopupOpen,setBusy }),

            page !== "errpage" && e(PopUpModal, {key: "modal", popupOpen, setPopupOpen, onClose: () => setPopupOpen({open:false,data:{}}), onSubmit: submitPayment, wallet:walletData,services: servicesData,setBusy,setWalletData,setMaxCUPoint,setTransactions }),

            page === "errpage" && e(ErrorPage,{setPage,handleLogout}),

            page !== "errpage" && e(SideMenus, { name:userData?.name || "Guest", phone:userData?.phone, menuOpen, onMenuClick: () => setMenuOpen(x=>!x), handleLogout,setPage }),

            page !== "errpage" && e(FooterNav,{onMenuClick: () => setMenuOpen(x=>!x),page,setPage })
        )
        )
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(e(App));

      lucide.createIcons();
    </script>
    
    
  </body>
</html>
